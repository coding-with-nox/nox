name: Docker Staging Images

on:
  push:
    tags:
      - "v*-staging"
      - "v*-stage"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: nox-api
            dockerfile: src/Nox.Api/Dockerfile
          - image_name: nox-dashboard
            dockerfile: src/Nox.Dashboard/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize registry owner
        id: vars
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ github.ref_name }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
