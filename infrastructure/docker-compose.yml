version: '3.9'

# Load .env file — copy .env.example to .env and fill values before running
# docker compose --env-file infra/.env up

services:

  # ── PostgreSQL (main application DB) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nox-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (Orleans cluster store) ──────────────────────────────────────
  postgres-orleans:
    image: postgres:16-alpine
    container_name: nox-postgres-orleans
    environment:
      POSTGRES_USER: ${POSTGRES_ORLEANS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ORLEANS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_ORLEANS_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_orleans_data:/var/lib/postgresql/data
      - ./postgres/orleans-init.sql:/docker-entrypoint-initdb.d/orleans-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ORLEANS_USER} -d ${POSTGRES_ORLEANS_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (pub/sub + Orleans reminders) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Password via env var — connection string must include ,password=...
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector DB for agent memory) ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nox-qdrant
    ports:
      - "6333:6333"   # HTTP REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Seq (structured log aggregator) ─────────────────────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: nox-seq
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_FIRSTRUN_ADMINPASSWORD}
    ports:
      - "5341:5341"   # ingestion
      - "8081:80"     # UI → http://localhost:8081
    volumes:
      - seq_data:/data

  # ── Keycloak (identity provider — OAuth2 / OIDC) ────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: nox-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/nox-realm.json:/opt/keycloak/data/import/nox-realm.json

volumes:
  postgres_data:
  postgres_orleans_data:
  redis_data:
  qdrant_data:
  seq_data:
